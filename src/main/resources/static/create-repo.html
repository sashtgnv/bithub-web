<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создание репозитория</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container narrow">
    <header>
        <a href="dashboard.html" class="back-link">← Назад к моим проектам</a>
    </header>

    <main>
        <h1>Новый репозиторий</h1>
        <form id="create-repo-form" class="form-card">
            <label for="repo-name">Название</label>
            <input type="text" id="repo-name" name="name" placeholder="my-awesome-project" required>

            <label for="repo-desc">Описание</label>
            <textarea id="repo-desc" name="description" placeholder="Кратко о проекте (необязательно)"></textarea>

            <label class="checkbox-label">
                <input type="checkbox" id="repo-public" name="isPublic" checked>
                <span>Публичный репозиторий</span>
            </label>

            <div id="form-error" class="error hidden"></div>

            <div class="form-actions">
                <button type="submit" id="submit-btn">Создать репозиторий</button>
            </div>
        </form>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/create-repo.js"></script>
</body>
</html>
