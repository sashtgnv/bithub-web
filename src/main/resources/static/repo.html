<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Репозиторий</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <header>
        <a href="public.html" class="back-link">← Назад к каталогу</a>
        <nav>
            <a href="dashboard.html">Мои проекты</a>
            <button id="logout-btn">Выйти</button>
        </nav>
    </header>

    <main>
        <!-- Блок информации о репозитории -->
        <section id="repo-info" class="info-card">
            <div class="loading">Загрузка информации...</div>
        </section>

        <!-- Блок действий (показывается только владельцу) -->
        <div id="owner-actions" class="hidden mt-20">
            <button id="delete-repo-btn" class="btn-danger">🗑️ Удалить репозиторий</button>
        </div>

        <!-- Блок истории коммитов -->
        <section class="mt-20">
            <h2>История коммитов</h2>
            <div class="loading" id="commits-loading">Загрузка истории...</div>

            <table id="commits-table" class="hidden">
                <thead>
                <tr></tr>
                    <th>Хеш</th>
                    <th>Сообщение</th>
                    <th>Автор</th>
                    <th>Дата</th>
                </tr>
                </thead>
                <tbody id="commits-body"></tbody>
            </table>

            <p id="commits-empty" class="meta hidden">Коммитов пока нет.</p>
        </section>
    </main>
</div>

<!-- Модальное окно подтверждения удаления -->
<div id="delete-modal" class="modal">
    <div class="modal-content">
        <h3>Подтверждение удаления</h3>
        <p>Вы уверены, что хотите удалить репозиторий <strong id="modal-repo-name"></strong>?</p>
        <p class="meta">Все файлы и история коммитов будут безвозвратно удалены.</p>
        <div id="modal-error" class="error hidden"></div>
        <div class="modal-actions">
            <button id="confirm-delete" class="btn-danger">Удалить</button>
            <button id="cancel-delete">Отмена</button>
        </div>
    </div>
</div>

<!-- Подключаем скрипты в правильном порядке -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/repo.js"></script>
</body>
</html>
