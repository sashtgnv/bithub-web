<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MyVCS — Мои проекты</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>Мои репозитории</h1>
        <nav>
            <a href="public.html">Публичные проекты</a>
            <button onclick="logout()">Выйти</button>
        </nav>
    </header>

    <div id="repo-list">Загрузка...</div>

    <div class="info-box">
        <h3>🖥️ Инструкция для CLI-клиента</h3>
        <p>1. Инициализация: <code>init</code></p>
        <p>2. Клонирование: <code>clone http://localhost:8080/api/repo/{id}</code></p>
        <p>3. Отправка: <code>push http://localhost:8080/api/repo/{id}</code></p>
        <p style="margin-top:8px;">Ваш токен: <code id="token-display" style="word-break:break-all;">...</code></p>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
