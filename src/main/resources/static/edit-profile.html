<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактирование профиля</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container narrow">
    <header>
        <a href="profile.html" class="back-link" id="back-link">← Назад в профиль</a>
    </header>

    <main>
        <h1>Редактирование профиля</h1>
        <form id="profile-form" class="form-card">
            <label for="username">Логин</label>
            <input type="text" id="username" readonly disabled>

            <label for="email">Email</label>
            <input type="email" id="email" readonly disabled>

            <label for="aboutMe">О себе</label>
            <textarea id="aboutMe" placeholder="Расскажите немного о себе..."></textarea>

            <div id="form-error" class="error hidden"></div>
            <div class="form-actions">
                <button type="submit" id="submit-btn">Сохранить</button>
                <a href="profile.html" id="cancel-link" class="btn-secondary">Отмена</a>
            </div>
        </form>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/edit-profile.js"></script>
</body>
</html>
