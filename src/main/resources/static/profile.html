<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/create-repo-styles.css">
    <link rel="stylesheet" href="css/dashboard-styles.css">
    <link rel="stylesheet" href="css/index-styles.css">
    <link rel="stylesheet" href="css/public-styles.css">
    <link rel="stylesheet" href="css/repo-styles.css"></head>
<body class="page">
<div class="container">

    <header>
        <div class="header-left">
            <i class="fas fa-code-branch logo-icon"></i>
            <h1 class="gradient-text" id="page-title">Профиль</h1>
        </div>
        <nav class="header-nav">
            <a href="public.html" class="nav-link">
                <i class="fas fa-globe"></i> Публичные проекты
            </a>
            <a href="dashboard.html" class="nav-link">
                <i class="fas fa-globe"></i> Мои проекты
            </a>
            <a href="edit-profile.html" id="edit-btn" class="btn btn-primary hidden">
                <i class="fas fa-pencil"></i> <Редактировать></Редактировать>
            </a>
            <button id="logout-btn" onclick="logout()" class="btn-danger hidden"><i class="fas fa-sign-out-alt"></i>Выйти</button>
        </nav>
    </header>

    <div class="content">


        <div class="profile-info-card">
            <div class="avatar-circle-large">👤</div>
            <h2 id="username-display" class="username-display">Загрузка...</h2>
            <p id="about-me-display" class="about-me-text"></p>


<!--            <p id="about-me-display" class="meta"-->
<!--               style="max-width:500px; margin:10px auto 0; font-style:italic;"></p>-->
        </div>

        <div class="dashboard-content">
            <div class="content-header">
                <h2><i class="fas fa-folder-open"></i> Список репозиториев</h2>

            </div>

            <div id="repo-list" class="repo-grid">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>Загрузка репозиториев...</span>
                </div>
            </div>

            <div class="empty-state hidden" id="empty-state">
                <i class="fas fa-folder-open icon-large"></i>
                <h3>У вас пока нет репозиториев</h3>
                <p>Создайте свой первый проект, чтобы начать работу</p>
                <a href="create-repo.html" class="btn btn-primary btn-lg">
                    <i class="fas fa-plus"></i> Создать репозиторий
                </a>
            </div>

            <div class="error-state hidden" id="error-state">
                <i class="fas fa-exclamation-triangle icon-large"></i>
                <h3>Ошибка загрузки</h3>
                <p id="error-message"></p>
                <button onclick="loadRepos()" class="btn btn-secondary">
                    <i class="fas fa-redo"></i> Попробовать снова
                </button>
            </div>
        </div>
    </div>

<!--        </section>-->

<!--</div>-->

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
